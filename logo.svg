<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Steam wisps -->
  <path d="M 38 14 Q 35 18, 38 22 Q 41 26, 38 30" stroke-width="1.5" opacity="0.55"/>
  <path d="M 50 10 Q 47 14, 50 18 Q 53 22, 50 26" stroke-width="1.5" opacity="0.55"/>
  <path d="M 62 14 Q 59 18, 62 22 Q 65 26, 62 30" stroke-width="1.5" opacity="0.55"/>

  <!-- Coffee cup body (trapezoidal mug) -->
  <path d="M 22 50 L 26 90 Q 26 94, 30 94 L 70 94 Q 74 94, 74 90 L 78 50 Z"/>

  <!-- Cup handle -->
  <path d="M 78 58 Q 90 58, 90 70 Q 90 82, 78 82"/>

  <!-- Coffee surface (inside cup rim) -->
  <ellipse cx="50" cy="50" rx="28" ry="4"/>

  <!-- Saucer hint -->
  <path d="M 16 94 Q 50 100, 84 94" stroke-width="1.5" opacity="0.6"/>

  <!-- Dog face peeking up - head (oval) -->
  <ellipse cx="50" cy="40" rx="14" ry="13" fill="var(--cream, #FBF7E8)"/>

  <!-- Floppy ears -->
  <path d="M 38 34 Q 32 38, 33 46 Q 35 50, 39 47" fill="var(--cream, #FBF7E8)"/>
  <path d="M 62 34 Q 68 38, 67 46 Q 65 50, 61 47" fill="var(--cream, #FBF7E8)"/>

  <!-- Eyes -->
  <circle cx="45" cy="39" r="1.4" fill="currentColor" stroke="none"/>
  <circle cx="55" cy="39" r="1.4" fill="currentColor" stroke="none"/>

  <!-- Snout (small oval) -->
  <ellipse cx="50" cy="45" rx="4" ry="3" fill="var(--cream, #FBF7E8)"/>

  <!-- Nose -->
  <ellipse cx="50" cy="44" rx="1.4" ry="1" fill="currentColor" stroke="none"/>

  <!-- Mouth -->
  <path d="M 50 45.5 L 50 47 M 50 47 Q 48 48, 47 47 M 50 47 Q 52 48, 53 47" stroke-width="1.3"/>
</svg>
